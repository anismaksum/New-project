name: kosthunt
description: Premium Flutter prototype for KostHunt, a kost and kontrakan discovery app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  app_links: ^6.3.3
  cached_network_image: ^3.4.1
  firebase_core: ^3.9.0
  firebase_messaging: ^15.1.6
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  image_picker: ^1.1.2
  intl: ^0.20.1
  supabase_flutter: ^2.8.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
